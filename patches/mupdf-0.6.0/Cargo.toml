[dependencies.zerocopy]
version = "0.8.17"
features = ["derive"]

[dev-dependencies.crossbeam-utils]
version = "0.8.1"

[dev-dependencies.serde_json]
version = "1.0.117"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies.font-kit]
version = "0.14.1"
